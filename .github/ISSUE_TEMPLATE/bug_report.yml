name: Bug report
description: Report something that isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I call chat.message(...) with ...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal code snippet or steps that reproduce the problem.
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: flask-chat-events version
      placeholder: "0.2.0"
    validations:
      required: true
  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "3.12"
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Tracebacks, environment details, related issues.
