name: Feature request
description: Suggest a new capability or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point motivating the request.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would the API or behavior look like? A code sketch helps.
      render: python
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: compat
    attributes:
      label: Compatibility
      options:
        - label: This change is backward-compatible (no change to existing event names or payloads)
