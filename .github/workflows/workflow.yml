name: CI & Release

# Runs tests on every push and PR. On a successful push to `main`, the patch
# version is auto-bumped, committed back, tagged, and published to PyPI.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Never run two releases at once (serialize pushes to main).
concurrency:
  group: ci-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # --------------------------------------------------------------------- #
  # 1. Test across supported Python versions.                             #
  # --------------------------------------------------------------------- #
  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
      - name: Run tests
        run: pytest -q

  # --------------------------------------------------------------------- #
  # 2. Bump patch version, commit, tag, and build the distribution.       #
  #    Only on a direct push to main whose tests passed.                   #
  # --------------------------------------------------------------------- #
  release:
    name: Bump version & build
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the bump commit + tag
    outputs:
      version: ${{ steps.bump.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # need full history to push back to main

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Bump patch version
        id: bump
        run: |
          python - <<'PY'
          import os, pathlib, re, tomllib

          pyproject = pathlib.Path("pyproject.toml")
          current = tomllib.loads(pyproject.read_text())["project"]["version"]
          major, minor, patch = (int(p) for p in current.split("."))
          new = f"{major}.{minor}.{patch + 1}"

          # pyproject.toml: version = "x.y.z"
          pyproject.write_text(
              re.sub(
                  rf'(?m)^version = "{re.escape(current)}"$',
                  f'version = "{new}"',
                  pyproject.read_text(),
              )
          )
          # flask_chat_events/__init__.py: __version__ = "x.y.z"
          init = pathlib.Path("flask_chat_events/__init__.py")
          init.write_text(
              re.sub(
                  rf'__version__ = "{re.escape(current)}"',
                  f'__version__ = "{new}"',
                  init.read_text(),
              )
          )

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"version={new}\n")
          print(f"Bumped {current} -> {new}")
          PY

      - name: Commit, tag, and push
        env:
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml flask_chat_events/__init__.py
          # [skip ci] stops this bump commit from re-triggering the workflow.
          git commit -m "chore: release v${VERSION} [skip ci]"
          git tag "v${VERSION}"
          git push origin HEAD:main
          git push origin "v${VERSION}"

      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Upload distribution artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # --------------------------------------------------------------------- #
  # 3. Publish to PyPI via Trusted Publishing (OIDC — no stored secrets).  #
  # --------------------------------------------------------------------- #
  publish:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: release
      url: https://pypi.org/project/flask-chat-events/
    permissions:
      id-token: write # required for Trusted Publishing
    steps:
      - name: Download distribution artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
